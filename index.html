<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>hana center</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: url('bq.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #566a7f;
        }

        canvas {
            touch-action: none;
            outline: none;
        }

        /* SCREEN 1: LOADING SCREEN */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease;
        }

        .flower-loader {
            position: relative;
            width: 160px;
            height: 160px;
            border: 1px solid rgba(255, 182, 193, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        .petal-circle {
            position: absolute;
            width: 120px;
            height: 120px;
            animation: rotateLoader 12s linear infinite;
        }

        .petal {
            position: absolute;
            width: 20px;
            height: 30px;
            background: #ffb6c1;
            border-radius: 0 80% 0 80%;
            opacity: 0.85;
            transform-origin: 60px 60px;
        }

        .petal:nth-child(1) { transform: rotate(0deg) translate(0, -8px); }
        .petal:nth-child(2) { transform: rotate(45deg) translate(0, -4px); }
        .petal:nth-child(3) { transform: rotate(90deg) translate(0, 0px); }
        .petal:nth-child(4) { transform: rotate(135deg) translate(0, -4px); }
        .petal:nth-child(5) { transform: rotate(180deg) translate(0, -8px); }
        .petal:nth-child(6) { transform: rotate(225deg) translate(0, -4px); }
        .petal:nth-child(7) { transform: rotate(270deg) translate(0, 0px); }
        .petal:nth-child(8) { transform: rotate(315deg) translate(0, -4px); }

        @keyframes rotateLoader {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 0.95rem;
            letter-spacing: 1px;
            color: #ff94a4;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .progress-bar-container {
            width: 140px;
            height: 4px;
            background-color: rgba(255, 182, 193, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #ff94a4;
            transition: width 0.1s linear;
        }

        .progress-num { font-size: 0.8rem; color: #ff94a4; }

        /* SCREEN 2: UI PASSWORD */
        #password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        .pad-card {
            background: rgba(255, 255, 255, 0.88);
            padding: 25px 25px 30px 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            width: 90%;
            max-width: 340px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sticker-container {
            position: relative;
            margin-bottom: 15px;
            animation: floatSticker 3s ease-in-out infinite alternate;
        }

        .top-sticker-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
            animation: wobbleSticker 2.5s ease-in-out infinite;
        }

        @keyframes floatSticker {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-8px); }
        }

        @keyframes wobbleSticker {
            0%, 100% { transform: rotate(-4deg); }
            50% { transform: rotate(4deg); }
        }

        .password-instruction {
            font-size: 0.9rem;
            color: #7d8c9e;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .dots-container { display: flex; gap: 12px; margin-bottom: 25px; }
        .dot {
            width: 10px;
            height: 10px;
            border: 2px solid #ffb6c1;
            border-radius: 50%;
            transition: background-color 0.2s ease;
        }
        .dot.active { background-color: #ffb6c1; transform: scale(1.1); }
        .dot.error { border-color: #ff4d6d; background-color: #ff4d6d; animation: shake 0.3s ease; }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
        }

        .key-btn {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.04);
            color: #6c7a89;
            font-size: 1.25rem;
            font-weight: 600;
            padding: 12px 0;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.1s ease;
        }
        .key-btn:active { background: #ffeef2; transform: scale(0.95); }
        .key-btn.action-btn { font-size: 1rem; background: #fff9fa; }

        /* EFFECT: TRANSITION BLOOM EFFECT */
        #bloom-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 80;
            pointer-events: none;
            display: none;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
        }

        .bloom-cell {
            background: linear-gradient(135deg, #ffd1dc, #bfe3ee);
            transform: scale(0);
            transition: transform 0.7s cubic-bezier(0.1, 0.8, 0.3, 1);
            border-radius: 50%;
        }

        /* SCREEN 3: MAIN 3D WEB */
        #main-web {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: none;
            overflow: hidden;
        }

        #canvas-3d {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* CONTENT OVERLAYS */
        #content-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
            z-index: 15;
            pointer-events: none; 
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #content-layer.active {
            pointer-events: auto;
            opacity: 1;
        }

        .menu-content {
            background: rgba(228, 111, 215, 1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            display: none; 
            text-align: center;
        }

        .menu-content.show {
            display: block;
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popUp {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .menu-content h2 {
            color: #ff94a4;
            font-size: 1.5rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .fav-list {
            list-style: none;
            text-align: left;
            color: #566a7f;
            line-height: 1.8;
            font-weight: 500;
        }
        .fav-list li::before { content: '🌸'; margin-right: 10px; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .gallery-grid img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .bq-img-large {
            width: 100%;
            border-radius: 16px;
            border: 3px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        /* OVERLAY / CLOSE BUTTON */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 50px;
            z-index: 20;
        }

        .close-view-btn {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 182, 193, 0.5);
            padding: 14px 32px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            color: #ff94a4;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transform: translateY(100px);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            pointer-events: auto;
        }

        .close-view-btn.show {
            transform: translateY(0);
            opacity: 1;
        }

    <script>
        const CORRECT_PIN = ["0", "2", "0", "7", "0", "8"];
        let currentPinInput = [];

        const orbitData = [
            { type: 'menu_fav', title: 'favorit' },       
            { type: 'menu_gallery', title: 'hana' },
            { type: 'menu_spotify', title: 'spotify' },
            { type: 'menu_bq', title: 'bouquet' }    
        ];

        window.addEventListener('DOMContentLoaded', () => {
            const progress = document.getElementById('load-progress');
            const progressText = document.getElementById('progress-text');
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        const loader = document.getElementById('loading-screen');
                        loader.style.opacity = '0';
                        setTimeout(() => {
                            loader.style.display = 'none';
                            document.getElementById('password-screen').style.display = 'flex';
                        }, 600);
                    }, 200);
                } else {
                    width += Math.floor(Math.random() * 25) + 15;
                    if(width > 100) width = 100;
                    progress.style.width = width + '%';
                    progressText.innerText = width + '%';
                }
            }, 40);
        });

        const dots = document.querySelectorAll('.dot');
        const pinMsg = document.getElementById('pin-message');
        const inputCard = document.getElementById('input-card');

        function updateDots() {
            dots.forEach((dot, index) => {
                if (index < currentPinInput.length) dot.classList.add('active');
                else { dot.classList.remove('active'); dot.classList.remove('error'); }
            });
        }

        function pressKey(num) {
            if (currentPinInput.length < 6) {
                currentPinInput.push(num);
                updateDots();
                if (currentPinInput.length === 6) setTimeout(verifyPin, 250);
            }
        }

        function pressDelete() {
            if (currentPinInput.length > 0) { currentPinInput.pop(); updateDots(); }
        }

        function verifyPin() {
            let isCorrect = currentPinInput.every((val, index) => val === CORRECT_PIN[index]);
            if (isCorrect) {
                pinMsg.innerText = "yeayy benar!";
                setTimeout(() => { executeTransitionEffect(); }, 400);
            } else {
                pinMsg.innerText = "makanya jangan sotta";
                dots.forEach(dot => dot.classList.add('error'));
                inputCard.classList.add('shake-animation');
                setTimeout(() => {
                    currentPinInput = [];
                    updateDots();
                    inputCard.classList.remove('shake-animation');
                }, 600);
            }
        }

        function executeTransitionEffect() {
            bgMusic.volume = 0.5;
bgMusic.play().catch(()=>{});
musicPlaying = true;
            const gridContainer = document.getElementById('bloom-transition');
            gridContainer.style.display = 'grid';
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.classList.add('bloom-cell');
                gridContainer.appendChild(cell);
            }
            const cells = document.querySelectorAll('.bloom-cell');
            cells.forEach((cell, index) => {
                setTimeout(() => { cell.style.transform = 'scale(2.2)'; }, (index % 4) * 35 + Math.floor(index / 4) * 35);
            });
            setTimeout(() => {
                document.getElementById('password-screen').style.display = 'none';
                document.getElementById('main-web').style.display = 'block';
                init3DSpace();
                cells.forEach((cell, index) => {
                    setTimeout(() => { cell.style.transform = 'scale(0)'; }, index * 15);
                });
                setTimeout(() => {
                    gridContainer.style.display = 'none';
                    gridContainer.innerHTML = '';
                }, 800);
            }, 600);
        }

        let scene, camera, renderer, controls, heartMesh;
        let orbitMeshes = [];
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        
        const orbitRadius = 3.5; 
        
        let appState = 'ORBIT';

        let targetLookAt = new THREE.Vector3();
        let savedCamPos = new THREE.Vector3();
        let savedTarget = new THREE.Vector3();

        function init3DSpace() {
            const container = document.getElementById('canvas-3d');
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);

            const orbitGeometry = new THREE.BufferGeometry();

                const theta = (i / 128) * Math.PI * 2;
                orbitVertices.push(Math.cos(theta) * orbitRadius, 0, Math.sin(theta) * orbitRadius);
            }
            orbitGeometry.setAttribute('position', new THREE.Float32BufferAttribute(orbitVertices, 3));
            let orbitTrackLine = new THREE.Line(orbitGeometry, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.18 }));
            scene.add(orbitTrackLine);

                ctx.fillRect(0, 0, 400, 500);

        ctx.textAlign = 'center';
        ctx.fillText('fav', 200, 440);

    };

    img.onerror = () => {
        ctx.fillStyle = '#ffeef2';
        ctx.fillRect(24, 24, 352, 352);
        buildMesh(frameGeometry, canvas, data, index);
    };

} else if (data.type === 'menu_gallery') {
    const img = new Image();
    img.src = 'gal.jpg';

    img.onload = () => {
        ctx.drawImage(img, 24, 24, 352, 352);
        ctx.fillStyle = '#8ecae6';
        ctx.font = 'bold 34px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('galeri', 200, 440);
        buildMesh(frameGeometry, canvas, data, index);
    };

    img.onerror = () => {
        ctx.fillStyle = '#eef5ff';
        ctx.fillRect(24, 24, 352, 352);
        buildMesh(frameGeometry, canvas, data, index);
    };

} else if (data.type === 'menu_spotify') {
    const img = new Image();
    img.src = 'spotify.jpg';

    img.onload = () => {
        ctx.drawImage(img, 24, 24, 352, 352);
        ctx.fillStyle = '#1db954';
        ctx.font = 'bold 34px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('spotify', 200, 440);
        buildMesh(frameGeometry, canvas, data, index);
    };

    img.onerror = () => {
        ctx.fillStyle = '#dfffe8';
        ctx.fillRect(24, 24, 352, 352);
        buildMesh(frameGeometry, canvas, data, index);
    };

                } else if (data.type === 'menu_bq') {
                    const img = new Image();
                    img.src = 'buket.jpg';
                    img.onload = () => {
                        ctx.drawImage(img, 24, 24, 352, 352);
                        ctx.fillStyle = '#8ecae6';
                        ctx.font = 'bold 34px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText('bouquet', 200, 440);
                        buildMesh(frameGeometry, canvas, data, index);
                    };
                    img.onerror = () => {
                        ctx.fillStyle = '#eef5ff';
                        ctx.fillRect(24, 24, 352, 352);
                        ctx.fillStyle = '#8ecae6';
                        ctx.font = 'bold 90px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('💐', 200, 200); 
                        ctx.font = 'bold 34px sans-serif';
                        ctx.fillText('bouquet', 200, 440);
                        buildMesh(frameGeometry, canvas, data, index);
                    };
                }
            });

            setupTouchEvents();
            window.addEventListener('resize', onWindowResize);
            animate3D();
        }

        function buildMesh(geometry, canvas, data, index) {
            const finalTexture = new THREE.CanvasTexture(canvas);
            finalTexture.colorSpace = THREE.SRGBColorSpace;
            
            const materials = [
                new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 }),
                new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 }),
                new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 }),
                new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 }),
                new THREE.MeshStandardMaterial({ map: finalTexture, roughness: 0.2 }), 
                new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 })
            ];

            const mesh = new THREE.Mesh(geometry, materials);
            mesh.userData = { type: data.type, title: data.title, index: index };
            
            const angle = index * (Math.PI * 2 / orbitData.length);
            mesh.position.set(Math.cos(angle) * orbitRadius, 0, Math.sin(angle) * orbitRadius);
            
            orbitMeshes.push(mesh);
            scene.add(mesh);
        }

        function setupTouchEvents() {
            let startX, startY;
            const canvasEl = renderer.domElement;
            
            canvasEl.addEventListener('pointerdown', (e) => {
                startX = e.clientX;
                startY = e.clientY;
            });

            canvasEl.addEventListener('pointerup', (e) => {
                let diffX = Math.abs(e.clientX - startX);
                let diffY = Math.abs(e.clientY - startY);
                if (diffX < 5 && diffY < 5 && appState === 'ORBIT') {
                    processCanvasClick(e);
                }
            });
        }

        let clock = new THREE.Clock();

        function animate3D() {
            requestAnimationFrame(animate3D);
            const elapsed = clock.getElapsedTime();

            if (heartMesh) {
                const pulse = 0.3 + Math.sin(elapsed * 4.0) * 0.008;
                heartMesh.scale.set(pulse, pulse, pulse);
                heartMesh.rotation.y = elapsed * 0.25;
            }

            orbitMeshes.forEach(mesh => {
                if (mesh.userData.type === 'menu_bq') {
                    mesh.position.y = Math.sin(elapsed * 2.5) * 0.15; 
                }
                mesh.lookAt(camera.position);
            });

            if (appState === 'ORBIT') {
                controls.update(); 
            } 
            else if (appState === 'TRANSITION_IN' || appState === 'TRANSITION_OUT') {
                camera.position.lerp(targetCamPos, 0.06);
                controls.target.lerp(targetLookAt, 0.06);
                controls.update(); 

                if (appState === 'TRANSITION_OUT' && camera.position.distanceTo(targetCamPos) < 0.1) {
                    appState = 'ORBIT';
                    controls.enabled = true;
                    controls.autoRotate = true;
                }
            }

            renderer.render(scene, camera);
        }

        function processCanvasClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(orbitMeshes);

            if (intersects.length > 0) {
                const clickedMesh = intersects[0].object;
                
                if (clickedMesh.userData.type === 'menu_spotify') {
                    window.open('https://open.spotify.com/playlist/4TsvCqz4rvwivfqUyK1TCo?si=EGhJLmN3SkG0Z6SY0qzcOA&utm_source=copy-link', '_blank');
                    return; 
                }

                focusOnTarget(clickedMesh);
            }
        }

        function focusOnTarget(mesh) {
            savedCamPos.copy(camera.position);
            savedTarget.copy(controls.target);

            controls.enabled = false;
            controls.autoRotate = false;
            appState = 'TRANSITION_IN'; 

            const meshPos = mesh.position.clone();
            const direction = new THREE.Vector3().copy(meshPos).normalize();
            
            // Jarak zoom out diperjauh (dari 1.5 menjadi 2.3)
            targetCamPos.copy(meshPos).add(direction.multiplyScalar(5)); 
            targetCamPos.y += 0.05; 
            targetLookAt.copy(meshPos);

            document.getElementById('btn-close').classList.add('show');

            setTimeout(() => {
                appState = 'FOCUSED';
                showContent(mesh.userData.type);
            }, 600);
        }

        function showContent(menuType) {
            document.querySelectorAll('.menu-content').forEach(el => el.classList.remove('show'));
            const contentDiv = document.getElementById('content-' + menuType);
            if (contentDiv) {
                contentDiv.classList.add('show');
                document.getElementById('content-layer').classList.add('active');
            }
        }

        function closeTargetView() {
            document.getElementById('btn-close').classList.remove('show');
            document.getElementById('content-layer').classList.remove('active');
            document.querySelectorAll('.menu-content').forEach(el => el.classList.remove('show'));
            
            targetCamPos.copy(savedCamPos);
            targetLookAt.copy(savedTarget);
            
            appState = 'TRANSITION_OUT';
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        const bgMusic = document.getElementById('bgMusic');
let musicPlaying = false;

function toggleMusic() {
    if (musicPlaying) {
        bgMusic.pause();
        document.querySelector('.music-control').innerHTML = '🔇 Off';
    } else {
        bgMusic.play();
        document.querySelector('.music-control').innerHTML = '🎵 On';
    }

    musicPlaying = !musicPlaying;
}
    </script>
</body>
